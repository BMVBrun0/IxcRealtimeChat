services:
  mongo:
    image: mongo:8.0
    container_name: ixc-chat-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    working_dir: /workspace
    init: true
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/ixc-chat
      JWT_SECRET: ${JWT_SECRET:-7e4d8c8f5a0c4d0e9c4c6f4a2f9e1b6c3d8a7f5b9e2c1d4a6f8b0c3d5e7f9a1}
      CLIENT_ORIGIN: http://localhost:3000
      SERVER_PUBLIC_URL: http://localhost:4000
      CLUSTER_ENABLED: ${CLUSTER_ENABLED:-false}
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-2}
      UPLOADS_DIR: /workspace/uploads
      CHOKIDAR_USEPOLLING: "true"
    command: ["sh", "/workspace/scripts/docker/server-entrypoint.sh"]
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - server_node_modules:/workspace/apps/server/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - server_uploads:/workspace/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    working_dir: /workspace
    init: true
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: ["sh", "/workspace/scripts/docker/web-entrypoint.sh"]
    depends_on:
      server:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - server_node_modules:/workspace/apps/server/node_modules
      - web_node_modules:/workspace/apps/web/node_modules

volumes:
  mongo_data:
  root_node_modules:
  server_node_modules:
  web_node_modules:
  server_uploads:
